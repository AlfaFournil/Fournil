<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Fournil de Jean" />
<meta name="theme-color" content="#2B1B12" />
<title>Fournil de Jean — Carnet de tournée</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --crust:#2B1B12;--flour:#FBF7EE;--wheat:#C98A2B;--wheat-soft:#F7E9D2;
    --herb:#5B7553;--herb-soft:#E9F0E6;--brique:#B5392C;--brique-soft:#FAE6E3;
    --taupe:#8A7860;--border:#E6DCC8;
    --display-font:Georgia,'Times New Roman',serif;
    --body-font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --mono-font:'Courier New',Courier,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--flour);font-family:var(--body-font);color:var(--crust);}
  .login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--crust);}
  .login-badge{width:80px;height:80px;border-radius:50%;border:3px solid var(--wheat);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .login-badge span{font-family:var(--display-font);color:var(--wheat);font-weight:700;font-size:22px;}
  .login-title{font-family:var(--display-font);color:var(--flour);font-size:26px;font-weight:700;margin:0 0 4px;text-align:center;}
  .login-sub{color:var(--taupe);font-size:13px;margin:0 0 32px;text-align:center;}
  .login-card{background:var(--flour);border-radius:20px;padding:24px;width:100%;max-width:360px;}
  .login-label{font-size:12px;font-weight:600;color:var(--taupe);display:block;margin-bottom:6px;}
  .login-input{width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;font-family:var(--body-font);color:var(--crust);background:#fff;margin-bottom:12px;}
  .login-input:focus{outline:none;border-color:var(--wheat);}
  .login-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--wheat);color:var(--crust);font-weight:700;font-size:15px;cursor:pointer;margin-top:4px;}
  .login-error{color:var(--brique);font-size:12px;text-align:center;margin-top:8px;min-height:18px;}
  .container{max-width:480px;margin:0 auto;padding:0 16px 112px;}
  .header-row{display:flex;align-items:center;gap:12px;padding-top:24px;padding-bottom:4px;}
  .badge-circle{width:48px;height:48px;border-radius:50%;background:var(--crust);border:2px solid var(--wheat);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .badge-circle span{font-family:var(--display-font);color:var(--wheat);font-weight:700;font-size:15px;}
  .header-text{flex:1;}
  .eyebrow{text-transform:uppercase;font-weight:600;color:var(--taupe);font-size:10px;letter-spacing:.12em;margin:0 0 2px;}
  .brand-title{font-family:var(--display-font);color:var(--crust);font-size:22px;font-weight:700;line-height:1;margin:0;}
  .livreur-chip{font-size:11px;color:var(--taupe);margin-top:2px;}
  .btn-logout{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--taupe);cursor:pointer;white-space:nowrap;}
  .subtitle{font-size:12px;color:var(--taupe);margin:6px 0 16px;}
  .error-box{margin-bottom:12px;font-size:12px;padding:8px 12px;border-radius:8px;background:var(--brique-soft);color:var(--brique);}
  .date-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .btn-icon,.date-btn{background:#fff;border:1px solid var(--border);border-radius:8px;color:var(--crust);font-family:var(--body-font);}
  .btn-icon{padding:10px;font-size:16px;line-height:1;}
  .date-btn{flex:1;text-align:center;padding:10px;font-weight:500;font-size:14px;}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
  .stat-chip{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 0;text-align:center;}
  .stat-value{font-family:var(--mono-font);font-size:18px;font-weight:700;line-height:1;}
  .stat-label{font-size:10px;color:var(--taupe);margin-top:4px;}
  .hour-block{margin-bottom:24px;}
  .hour-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .hour-label{font-family:var(--display-font);color:var(--crust);font-size:20px;font-weight:700;}
  .hour-line{flex:1;height:1px;background:var(--border);}
  .delivery-list{display:flex;flex-direction:column;gap:8px;}
  .delivery-card{text-align:left;width:100%;border-radius:12px;padding:12px;background:#fff;border:1px solid var(--border);cursor:pointer;font-family:var(--body-font);}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .card-time{font-family:var(--mono-font);color:var(--taupe);font-size:11px;}
  .status-badge{font-weight:600;font-size:10px;padding:2px 8px;border-radius:999px;display:inline-block;}
  .card-client{font-weight:700;font-size:14px;color:var(--crust);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-address{font-size:12px;color:var(--taupe);margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:64px 24px;}
  .empty-state .icon{font-size:32px;margin-bottom:12px;}
  .empty-state .title{font-weight:600;font-size:14px;color:var(--crust);margin:0;}
  .empty-state .sub{font-size:12px;color:var(--taupe);margin:4px 0 0;}
  .fab{position:fixed;bottom:24px;right:24px;border-radius:50%;width:56px;height:56px;background:var(--wheat);color:var(--crust);border:none;box-shadow:0 6px 16px rgba(201,138,43,.4);z-index:30;font-size:26px;line-height:1;cursor:pointer;}
  .modal-overlay{position:fixed;inset:0;z-index:40;display:flex;align-items:flex-end;justify-content:center;background:rgba(43,27,18,.55);}
  .modal-box{width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px;overflow-y:auto;background:var(--flour);max-height:90vh;position:relative;}
  @media(min-width:640px){.modal-overlay{align-items:center;}.modal-box{border-radius:20px;}}
  .modal-title{font-family:var(--display-font);color:var(--crust);font-size:18px;font-weight:700;margin:0;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .close-btn{background:none;border:none;font-size:20px;color:var(--taupe);cursor:pointer;padding:4px;}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
  .field label{font-size:12px;font-weight:500;color:var(--taupe);}
  .field input,.field textarea{width:100%;padding:10px;border-radius:8px;font-size:14px;background:#fff;border:1px solid var(--border);color:var(--crust);font-family:var(--body-font);}
  .field textarea{resize:none;}
  .btn-primary{width:100%;padding:13px;border-radius:12px;border:none;font-weight:600;font-size:14px;cursor:pointer;background:var(--crust);color:var(--flour);margin-top:4px;}
  .btn-pdf{width:100%;padding:11px;border-radius:10px;border:2px dashed var(--wheat);background:var(--wheat-soft);color:var(--crust);font-weight:600;font-size:13px;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-pdf:disabled{opacity:.6;cursor:wait;}
  .pdf-ok{background:var(--herb-soft);color:var(--herb);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:12px;font-weight:500;}
  .outcome-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .outcome-btn{padding:10px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;background:#fff;border:1px solid var(--border);color:var(--crust);}
  .outcome-btn.active{color:#fff;border:none;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .info-row{display:flex;align-items:flex-start;gap:8px;font-size:14px;margin-top:10px;}
  .recap-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:14px;margin-bottom:12px;}
  .recap-label{font-size:11px;color:var(--taupe);margin:0 0 2px;}
  .recap-value{font-weight:600;margin:0;}
  .recap-value.mono{font-family:var(--mono-font);}
  .actions-row{display:flex;gap:8px;margin-top:8px;}
  .btn-outline{flex:1;padding:10px;border-radius:8px;background:#fff;border:1px solid var(--border);color:var(--crust);font-weight:500;font-size:14px;cursor:pointer;}
  .btn-danger{padding:10px 14px;border-radius:8px;background:var(--brique-soft);color:var(--brique);border:none;cursor:pointer;font-size:16px;}
  .stamp{position:absolute;top:16px;right:16px;width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(-12deg);background:var(--flour);animation:stampIn .35s ease-out;}
  .stamp-inner{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;}
  .stamp-text{font-family:var(--mono-font);font-weight:700;font-size:9px;line-height:1.2;}
  @keyframes stampIn{0%{opacity:0;transform:scale(1.6) rotate(-18deg);}60%{opacity:1;}100%{opacity:1;transform:scale(1) rotate(-12deg);}}
  .spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--crust);animation:spin .9s linear infinite;display:inline-block;}
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;color:var(--taupe);}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="pdf-input" accept="application/pdf" style="display:none" />
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
(function(){
"use strict";
var MOT_DE_PASSE="Mohcine";
var STATUS_META={
  pending:{label:'En attente',fg:'#C98A2B',bg:'#F7E9D2'},
  delivered:{label:'Livre',fg:'#5B7553',bg:'#E9F0E6'},
  absent:{label:'Absent',fg:'#B5392C',bg:'#FAE6E3'},
  refused:{label:'Refuse',fg:'#B5392C',bg:'#FAE6E3'},
  incident:{label:'Incident',fg:'#B5392C',bg:'#FAE6E3'}
};
var OUTCOMES=[{key:'delivered',label:'Livre'},{key:'absent',label:'Absent'},{key:'refused',label:'Refuse'},{key:'incident',label:'Incident'}];
var state={
  screen:'login',loginError:'',
  livreurName:localStorage.getItem('fdj-livreur')||'',
  livreurPhone:localStorage.getItem('fdj-livreur-phone')||'',
  date:toLocalISODate(new Date()),deliveries:[],loading:false,
  showAdd:false,selectedId:null,errorMsg:'',pendingOutcome:'delivered',
  pdfParsing:false,pdfData:null
};
if(sessionStorage.getItem('fdj-auth')==='1'){state.screen=state.livreurName?'app':'name';}

function toLocalISODate(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}
function formatDateLabel(s){var p=s.split('-').map(Number),dt=new Date(p[0],p[1]-1,p[2]);var l=dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});return l.charAt(0).toUpperCase()+l.slice(1);}
function genId(){return 'd_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function parsePdfText(text){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  var result={client:'',address:'',ref:'',instructions:''};
  var i,cpIdx=-1;
  for(i=0;i<lines.length;i++){if(/N.?\s*BL/i.test(lines[i])){var bm=lines[i].match(/N.?\s*(BL[\d\/]+)/i);if(bm)result.ref=bm[1].trim();break;}}
  for(i=0;i<lines.length;i++){if(/^\d{5}\s+[A-Za-z]/.test(lines[i])){if(cpIdx===-1){cpIdx=i;}else{cpIdx=i;break;}}}
  if(cpIdx>0){
    var addrLine=lines[cpIdx-1]||'';
    var ci=cpIdx-2;while(ci>=0&&!/[A-Z]{3,}/.test(lines[ci]))ci--;
    var cl=[];for(var j=ci;j<cpIdx-1;j++)cl.push(lines[j]);
    result.client=cl.join(' ').trim();result.address=addrLine+', '+lines[cpIdx];
    for(i=cpIdx+1;i<Math.min(cpIdx+4,lines.length);i++){if(/tel|mob/i.test(lines[i])){var tm=lines[i].match(/[\d\s\.]{10,}/);if(tm)result.instructions='Tel : '+tm[0].trim();}}
  }
  var kw=/portail|code|digicode|sas|gardien|laisser|sonnette|livraison entre|reception|nuit/i;
  var il=[];lines.forEach(function(l){if(kw.test(l)&&l.length>8)il.push(l);});
  if(il.length)result.instructions=(result.instructions?result.instructions+'\n':'')+il.join(' ');
  var pk=/pain|baguette|viennois|croissant|brioche|tradition|complet|seigle|\d{3,}g|\d+cm/i;
  var pr=[];lines.forEach(function(l){if(pk.test(l))pr.push(l);});
  if(pr.length)result.ref=(result.ref?result.ref+' | ':'')+pr.slice(0,3).join(', ');
  return result;
}
function readPdf(file){
  state.pdfParsing=true;state.pdfData=null;render();
  var reader=new FileReader();
  reader.onload=function(e){
    pdfjsLib.getDocument({data:new Uint8Array(e.target.result)}).promise.then(function(pdf){
      var pages=[];for(var p=1;p<=pdf.numPages;p++)pages.push(p);
      Promise.all(pages.map(function(p){return pdf.getPage(p).then(function(pg){return pg.getTextContent().then(function(c){return c.items.map(function(it){return it.str;}).join('\n');});});})).then(function(texts){
        var parsed=parsePdfText(texts.join('\n'));
        state.pdfData=parsed;state.pdfParsing=false;render();
        setTimeout(function(){
          if(document.getElementById('f-client')&&parsed.client)document.getElementById('f-client').value=parsed.client;
          if(document.getElementById('f-address')&&parsed.address)document.getElementById('f-address').value=parsed.address;
          if(document.getElementById('f-ref')&&parsed.ref)document.getElementById('f-ref').value=parsed.ref;
          if(document.getElementById('f-instructions')&&parsed.instructions)document.getElementById('f-instructions').value=parsed.instructions;
        },50);
      });
    }).catch(function(){state.pdfParsing=false;state.errorMsg='Erreur lecture PDF.';render();});
  };
  reader.readAsArrayBuffer(file);
}
function load(date){
  state.loading=true;render();
  try{var raw=localStorage.getItem('fdj-tournee:'+date);state.deliveries=raw?(JSON.parse(raw)||[]):[];}catch(e){state.deliveries=[];}
  state.loading=false;render();
}
function persist(list){
  state.deliveries=list;
  try{localStorage.setItem('fdj-tournee:'+state.date,JSON.stringify(list));}catch(e){state.errorMsg='Sauvegarde echouee.';}
}
function addDelivery(data){
  var entry={id:genId(),client:data.client,address:data.address,time:data.time,ref:data.ref||'',instructions:data.instructions||'',status:'pending',deliveredAt:null,livreur:'',livreurPhone:'',note:'',createdAt:new Date().toISOString()};
  persist(state.deliveries.concat([entry]));state.showAdd=false;state.pdfData=null;render();
}
function pointDelivery(id,updates){persist(state.deliveries.map(function(d){return d.id===id?Object.assign({},d,updates):d;}));render();}
function revertDelivery(id){pointDelivery(id,{status:'pending',deliveredAt:null,livreur:'',livreurPhone:'',note:''});}
function deleteDelivery(id){persist(state.deliveries.filter(function(d){return d.id!==id;}));state.selectedId=null;render();}
function changeDate(delta){
  if(delta==='today'){state.date=toLocalISODate(new Date());}
  else{var p=state.date.split('-').map(Number),dt=new Date(p[0],p[1]-1,p[2]);dt.setDate(dt.getDate()+delta);state.date=toLocalISODate(dt);}
  load(state.date);
}
function statChip(l,v,c){return'<div class="stat-chip"><p class="stat-value" style="color:'+c+'">'+v+'</p><p class="stat-label">'+l+'</p></div>';}
function deliveryCard(d){var meta=STATUS_META[d.status];return'<button class="delivery-card" data-action="select" data-id="'+d.id+'"><div class="card-top"><span class="card-time">'+esc(d.time)+'</span><span class="status-badge" style="color:'+meta.fg+';background:'+meta.bg+'">'+meta.label+'</span></div><p class="card-client">'+esc(d.client)+'</p><p class="card-address">'+esc(d.address)+'</p></button>';}
function renderTimeline(){
  if(state.loading)return'<div class="loading-state"><div class="spinner"></div><span style="font-size:14px;margin-top:8px;">Chargement...</span></div>';
  var sorted=state.deliveries.slice().sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
  if(!sorted.length)return'<div class="empty-state"><div class="icon">📦</div><p class="title">Aucune livraison prevue.</p><p class="sub">Appuyez sur + pour ajouter ou importer un PDF.</p></div>';
  var groups={},order=[];
  sorted.forEach(function(d){var h=(d.time||'00:00').split(':')[0];if(!groups[h]){groups[h]=[];order.push(h);}groups[h].push(d);});
  order.sort();
  return order.map(function(h){return'<div class="hour-block"><div class="hour-header"><span class="hour-label">'+h+'h</span><div class="hour-line"></div></div><div class="delivery-list">'+groups[h].map(deliveryCard).join('')+'</div></div>';}).join('');
}
function renderAddModal(){
  if(!state.showAdd)return'';
  var now=new Date(),rm=Math.ceil(now.getMinutes()/5)*5%60;
  var dt=String(now.getHours()).padStart(2,'0')+':'+String(rm).padStart(2,'0');
  var pdfBtn=state.pdfParsing?'<button class="btn-pdf" disabled>⏳ Lecture du PDF en cours...</button>':'<button class="btn-pdf" data-action="open-pdf">📄 Importer un bon de livraison PDF</button>';
  var pdfOk=state.pdfData?'<div class="pdf-ok">✅ PDF importe — verifiez et completez les champs.</div>':'';
  return'<div class="modal-overlay" data-action="close-add"><div class="modal-box" data-action="noop">'+
    '<div class="modal-header"><h2 class="modal-title">Nouvelle livraison</h2><button class="close-btn" data-action="close-add">&#10005;</button></div>'+
    pdfBtn+pdfOk+
    '<div class="field"><label>Client *</label><input id="f-client" placeholder="Nom du client" value="'+esc(state.pdfData&&state.pdfData.client||'')+'" /></div>'+
    '<div class="field"><label>Adresse *</label><input id="f-address" placeholder="Adresse de livraison" value="'+esc(state.pdfData&&state.pdfData.address||'')+'" /></div>'+
    '<div class="field"><label>Heure prevue *</label><input id="f-time" type="time" value="'+dt+'" /></div>'+
    '<div class="field"><label>Commande</label><input id="f-ref" placeholder="Ex. 6 baguettes, 2 tartes" value="'+esc(state.pdfData&&state.pdfData.ref||'')+'" /></div>'+
    '<div class="field"><label>Instructions</label><textarea id="f-instructions" rows="2" placeholder="Code immeuble, etage...">'+esc(state.pdfData&&state.pdfData.instructions||'')+'</textarea></div>'+
    '<button class="btn-primary" data-action="submit-add">Ajouter a la tournee</button>'+
    '</div></div>';
}
function renderDetailModal(){
  if(!state.selectedId)return'';
  var d=state.deliveries.find(function(x){return x.id===state.selectedId;});
  if(!d)return'';
  var meta=STATUS_META[d.status],isPointed=d.status!=='pending';
  var html='<div class="modal-overlay" data-action="close-detail"><div class="modal-box" data-action="noop">';
  html+='<button class="close-btn" style="position:absolute;top:18px;left:18px;" data-action="close-detail">&#10005;</button>';
  if(isPointed){var ts=d.deliveredAt?new Date(d.deliveredAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'';html+='<div class="stamp" style="border:2px solid '+meta.fg+'"><div class="stamp-inner" style="border:1px dashed '+meta.fg+'"><span class="stamp-text" style="color:'+meta.fg+'">'+meta.label.toUpperCase()+'<br>'+ts+'</span></div></div>';}
  html+='<div style="padding-top:32px;padding-right:64px;">';
  html+='<p style="font-family:var(--mono-font);color:var(--taupe);font-size:12px;margin:0 0 2px;">'+esc(d.time)+(d.ref?' · '+esc(d.ref):'')+'</p>';
  html+='<h2 style="font-family:var(--display-font);color:var(--crust);font-size:20px;font-weight:700;margin:0;">'+esc(d.client)+'</h2></div>';
  html+='<div class="info-row"><span>📍</span><span>'+esc(d.address)+'</span></div>';
  if(d.instructions)html+='<div class="info-row" style="color:var(--taupe)"><span>📝</span><span>'+esc(d.instructions)+'</span></div>';
  html+='<div class="divider"></div>';
  if(!isPointed){
    html+='<p style="font-size:14px;font-weight:600;margin:0 0 12px;">Pointer la livraison</p><div class="outcome-grid">';
    OUTCOMES.forEach(function(o){var active=state.pendingOutcome===o.key,m=STATUS_META[o.key];html+='<button class="outcome-btn'+(active?' active':'')+'" style="'+(active?'background:'+m.fg+';':'')+'" data-action="set-outcome" data-key="'+o.key+'">'+o.label+'</button>';});
    html+='</div>';
    html+='<div class="field"><label>Nom du livreur</label><input id="f-livreur" value="'+esc(state.livreurName)+'" placeholder="Votre prenom" /></div>';
    html+='<div class="field"><label>Vos constats</label><textarea id="f-note" rows="3" placeholder="Ex. remis en main propre, laisse chez le voisin..."></textarea></div>';
    html+='<button class="btn-primary" style="background:'+STATUS_META[state.pendingOutcome].fg+';color:#fff;" data-action="submit-point" data-id="'+d.id+'">Valider le pointage</button>';
  } else {
    var ts2=d.deliveredAt?new Date(d.deliveredAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'';
    html+='<div class="recap-grid"><div><p class="recap-label">Heure reelle</p><p class="recap-value mono">'+ts2+'</p></div>';
    if(d.livreur)html+='<div><p class="recap-label">Livreur</p><p class="recap-value">'+esc(d.livreur)+(d.livreurPhone?' · <a href="tel:'+esc(d.livreurPhone)+'" style="color:var(--wheat);">📞 '+esc(d.livreurPhone)+'</a>':'')+'</p></div>';
    html+='</div>';
    if(d.note)html+='<div style="margin-bottom:12px;"><p class="recap-label">Constats</p><p style="font-size:14px;margin:0;">'+esc(d.note)+'</p></div>';
    html+='<div class="actions-row"><button class="btn-outline" data-action="revert" data-id="'+d.id+'">&#8634; Annuler</button><button class="btn-danger" data-action="delete" data-id="'+d.id+'">&#128465;</button></div>';
  }
  html+='</div></div>';return html;
}
function renderApp(){
  var total=state.deliveries.length;
  var delivered=state.deliveries.filter(function(d){return d.status==='delivered';}).length;
  var pending=state.deliveries.filter(function(d){return d.status==='pending';}).length;
  var issues=state.deliveries.filter(function(d){return['absent','refused','incident'].indexOf(d.status)!==-1;}).length;
  var html='<div class="container">';
  html+='<div class="header-row"><div class="badge-circle"><span>FdJ</span></div><div class="header-text"><p class="eyebrow">Carnet de tournee</p><h1 class="brand-title">Fournil de Jean</h1>';
  html+='<p class="livreur-chip">👤 '+esc(state.livreurName)+(state.livreurPhone?' · <a href="tel:'+esc(state.livreurPhone)+'" style="color:var(--wheat);text-decoration:none;">📞 '+esc(state.livreurPhone)+'</a>':'')+'</p>';
  html+='</div><button class="btn-logout" data-action="logout">Changer</button></div>';
  html+='<p class="subtitle">Suivi des livraisons, heure par heure</p>';
  if(state.errorMsg)html+='<div class="error-box">'+esc(state.errorMsg)+'</div>';
  html+='<div class="date-row"><button class="btn-icon" data-action="prev-day">&#8249;</button><button class="date-btn" data-action="today">'+formatDateLabel(state.date)+'</button><button class="btn-icon" data-action="next-day">&#8250;</button></div>';
  html+='<div class="stats-grid">'+statChip('Total',total,'#2B1B12')+statChip('Livrees',delivered,'#5B7553')+statChip('Attente',pending,'#C98A2B')+statChip('Incidents',issues,'#B5392C')+'</div>';
  html+=renderTimeline()+'</div>';
  html+='<button class="fab" data-action="open-add">+</button>';
  html+=renderAddModal()+renderDetailModal();
  return html;
}
function renderLoginScreen(){return'<div class="login-screen"><div class="login-badge"><span>FdJ</span></div><h1 class="login-title">Fournil de Jean</h1><p class="login-sub">Carnet de tournee — acces securise</p><div class="login-card"><label class="login-label">Mot de passe</label><input class="login-input" id="l-pwd" type="password" placeholder="••••••••" /><button class="login-btn" data-action="do-login">Entrer</button><p class="login-error">'+esc(state.loginError)+'</p></div></div>';}
function renderNameScreen(){return'<div class="login-screen"><div class="login-badge"><span>FdJ</span></div><h1 class="login-title">Bonjour !</h1><p class="login-sub">Entrez vos informations</p><div class="login-card"><label class="login-label">Votre prenom</label><input class="login-input" id="l-name" type="text" placeholder="Ex. Mohamed" /><label class="login-label">Votre numero de telephone</label><input class="login-input" id="l-phone" type="tel" placeholder="Ex. 06 12 34 56 78" /><button class="login-btn" data-action="do-setname">Continuer</button></div></div>';}
function render(){
  if(state.screen==='login'){document.getElementById('app').innerHTML=renderLoginScreen();setTimeout(function(){var el=document.getElementById('l-pwd');if(el)el.focus();},50);return;}
  if(state.screen==='name'){document.getElementById('app').innerHTML=renderNameScreen();setTimeout(function(){var el=document.getElementById('l-name');if(el)el.focus();},50);return;}
  document.getElementById('app').innerHTML=renderApp();
}
document.getElementById('app').addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');if(!el)return;
  var action=el.getAttribute('data-action'),id=el.getAttribute('data-id');
  if(action==='noop'){e.stopPropagation();return;}
  if(action==='do-login'){
    var pwd=document.getElementById('l-pwd').value;
    if(pwd===MOT_DE_PASSE){sessionStorage.setItem('fdj-auth','1');state.loginError='';state.screen=state.livreurName?'app':'name';if(state.screen==='app')load(state.date);else render();}
    else{state.loginError='Mot de passe incorrect.';render();}
    return;
  }
  if(action==='do-setname'){
    var name=document.getElementById('l-name').value.trim();
    if(!name)return;
    var phone=document.getElementById('l-phone').value.trim();
    state.livreurName=name;state.livreurPhone=phone;
    localStorage.setItem('fdj-livreur',name);
    localStorage.setItem('fdj-livreur-phone',phone);
    state.screen='app';load(state.date);return;
  }
  if(action==='logout'){state.livreurName='';state.livreurPhone='';localStorage.removeItem('fdj-livreur');localStorage.removeItem('fdj-livreur-phone');state.screen='name';render();return;}
  if(action==='prev-day')changeDate(-1);
  else if(action==='next-day')changeDate(1);
  else if(action==='today')changeDate('today');
  else if(action==='open-add'){state.showAdd=true;state.pdfData=null;render();}
  else if(action==='close-add'){state.showAdd=false;state.pdfData=null;render();}
  else if(action==='open-pdf'){document.getElementById('pdf-input').click();}
  else if(action==='submit-add'){
    var c=document.getElementById('f-client').value.trim();
    var a=document.getElementById('f-address').value.trim();
    var t=document.getElementById('f-time').value;
    var r=document.getElementById('f-ref').value.trim();
    var ins=document.getElementById('f-instructions').value.trim();
    if(!c||!a||!t)return;
    addDelivery({client:c,address:a,time:t,ref:r,instructions:ins});
  }
  else if(action==='select'){state.selectedId=id;state.pendingOutcome='delivered';render();}
  else if(action==='close-detail'){state.selectedId=null;render();}
  else if(action==='set-outcome'){state.pendingOutcome=el.getAttribute('data-key');render();}
  else if(action==='submit-point'){
    var livreur=document.getElementById('f-livreur').value.trim();
    var note=document.getElementById('f-note').value.trim();
    pointDelivery(id,{status:state.pendingOutcome,deliveredAt:new Date().toISOString(),livreur:livreur,livreurPhone:state.livreurPhone,note:note});
  }
  else if(action==='revert')revertDelivery(id);
  else if(action==='delete')deleteDelivery(id);
});
document.getElementById('app').addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  if(state.screen==='login'){var b=document.querySelector('[data-action="do-login"]');if(b)b.click();}
  if(state.screen==='name'){var b=document.querySelector('[data-action="do-setname"]');if(b)b.click();}
});
document.getElementById('pdf-input').addEventListener('change',function(e){
  var file=e.target.files&&e.target.files[0];if(file)readPdf(file);e.target.value='';
});
render();
if(state.screen==='app')load(state.date);
})();
</script>
</body>
</html>
