<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Fournil de Jean" />
<meta name="theme-color" content="#2B1B12" />
<title>Fournil de Jean — Carnet de tournée</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  body { margin: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.9s linear infinite; }
  @keyframes stampIn { 0% { opacity:0; transform: scale(1.6) rotate(-18deg);} 60% {opacity:1;} 100% {opacity:1; transform: scale(1) rotate(-12deg);} }
  .stamp { animation: stampIn 0.35s ease-out; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const COLORS = {
  crust: '#2B1B12',
  flour: '#FBF7EE',
  cardBg: '#FFFFFF',
  wheat: '#C98A2B',
  wheatSoft: '#F7E9D2',
  herb: '#5B7553',
  herbSoft: '#E9F0E6',
  brique: '#B5392C',
  briqueSoft: '#FAE6E3',
  taupe: '#8A7860',
  border: '#E6DCC8',
};
const DISPLAY_FONT = "'Fraunces', serif";
const MONO_FONT = "'JetBrains Mono', monospace";

function Icon({ children, size = 18, ...props }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
      {children}
    </svg>
  );
}
const IconPlus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></Icon>;
const IconX = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></Icon>;
const IconChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6" /></Icon>;
const IconChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;
const IconMapPin = (p) => <Icon {...p}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></Icon>;
const IconClock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></Icon>;
const IconCheck = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></Icon>;
const IconAlert = (p) => <Icon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></Icon>;
const IconUser = (p) => <Icon {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></Icon>;
const IconUndo = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10" /><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" /></Icon>;
const IconTrash = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></Icon>;
const IconPackage = (p) => <Icon {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></Icon>;
const IconFileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /></Icon>;

function Spinner({ size = 24, color }) {
  return <div className="spinner" style={{ width: size, height: size, borderRadius: '50%', border: `3px solid ${COLORS.border}`, borderTopColor: color || COLORS.crust }} />;
}

const OUTCOMES = [
  { key: 'delivered', label: 'Livré', icon: IconCheck },
  { key: 'absent', label: 'Absent', icon: IconUser },
  { key: 'refused', label: 'Refusé', icon: IconX },
  { key: 'incident', label: 'Incident', icon: IconAlert },
];
const STATUS_META = {
  pending: { label: 'En attente', fg: COLORS.wheat, bg: COLORS.wheatSoft },
  delivered: { label: 'Livré', fg: COLORS.herb, bg: COLORS.herbSoft },
  absent: { label: 'Absent', fg: COLORS.brique, bg: COLORS.briqueSoft },
  refused: { label: 'Refusé', fg: COLORS.brique, bg: COLORS.briqueSoft },
  incident: { label: 'Incident', fg: COLORS.brique, bg: COLORS.briqueSoft },
};
const inputStyle = { background: '#fff', border: `1px solid ${COLORS.border}`, color: COLORS.crust };

function toLocalISODate(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function formatDateLabel(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const label = dt.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  return label.charAt(0).toUpperCase() + label.slice(1);
}
function genId() { return 'd_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

function Field({ label, children }) {
  return (
    <label className="flex flex-col gap-1">
      <span className="text-xs font-medium" style={{ color: COLORS.taupe }}>{label}</span>
      {children}
    </label>
  );
}
function StatChip({ label, value, color }) {
  return (
    <div className="rounded-lg py-2 text-center" style={{ background: COLORS.cardBg, border: `1px solid ${COLORS.border}` }}>
      <p style={{ fontFamily: MONO_FONT, color }} className="text-lg font-bold leading-none">{value}</p>
      <p className="mt-1" style={{ color: COLORS.taupe, fontSize: '10px' }}>{label}</p>
    </div>
  );
}
function EmptyState({ text, sub }) {
  return (
    <div className="flex flex-col items-center text-center py-16 px-6">
      <IconPackage size={32} className="mb-3" style={{ color: COLORS.border }} />
      <p className="font-medium text-sm" style={{ color: COLORS.crust }}>{text}</p>
      <p className="text-xs mt-1" style={{ color: COLORS.taupe }}>{sub}</p>
    </div>
  );
}
function DeliveryCard({ d, onClick }) {
  const meta = STATUS_META[d.status];
  return (
    <button onClick={onClick} className="text-left w-full rounded-xl p-3" style={{ background: COLORS.cardBg, border: `1px solid ${COLORS.border}` }}>
      <div className="flex items-center gap-2 mb-1">
        <span className="flex items-center gap-1" style={{ fontFamily: MONO_FONT, color: COLORS.taupe, fontSize: '11px' }}>
          <IconClock size={11} />{d.time}
        </span>
        <span className="font-medium px-2 py-0.5 rounded-full" style={{ color: meta.fg, background: meta.bg, fontSize: '10px' }}>{meta.label}</span>
      </div>
      <p className="font-semibold text-sm truncate" style={{ color: COLORS.crust }}>{d.client}</p>
      <p className="text-xs truncate" style={{ color: COLORS.taupe }}>{d.address}</p>
    </button>
  );
}

function AddDeliveryModal({ onClose, onSubmit }) {
  const now = new Date();
  const roundedMin = Math.ceil(now.getMinutes() / 5) * 5 % 60;
  const defaultTime = `${String(now.getHours()).padStart(2, '0')}:${String(roundedMin).padStart(2, '0')}`;
  const [client, setClient] = useState('');
  const [address, setAddress] = useState('');
  const [time, setTime] = useState(defaultTime);
  const [ref, setRef] = useState('');
  const [instructions, setInstructions] = useState('');

  function submit(e) {
    e.preventDefault();
    if (!client.trim() || !address.trim() || !time) return;
    onSubmit({ client: client.trim(), address: address.trim(), time, ref: ref.trim(), instructions: instructions.trim() });
  }
  return (
    <div className="fixed inset-0 z-40 flex items-end sm:items-center justify-center" style={{ background: 'rgba(43,27,18,0.55)' }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} className="w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-5 overflow-y-auto" style={{ background: COLORS.flour, maxHeight: '90vh' }}>
        <div className="flex items-center justify-between mb-4">
          <h2 style={{ fontFamily: DISPLAY_FONT, color: COLORS.crust }} className="text-lg font-semibold">Nouvelle livraison</h2>
          <button onClick={onClose}><IconX size={20} style={{ color: COLORS.taupe }} /></button>
        </div>
        <form onSubmit={submit} className="flex flex-col gap-3">
          <Field label="Client *">
            <input autoFocus value={client} onChange={(e) => setClient(e.target.value)} className="w-full p-2.5 rounded-lg text-sm" style={inputStyle} placeholder="Nom du client" />
          </Field>
          <Field label="Adresse *">
            <input value={address} onChange={(e) => setAddress(e.target.value)} className="w-full p-2.5 rounded-lg text-sm" style={inputStyle} placeholder="Adresse de livraison" />
          </Field>
          <Field label="Heure prévue *">
            <input type="time" value={time} onChange={(e) => setTime(e.target.value)} className="w-full p-2.5 rounded-lg text-sm" style={inputStyle} />
          </Field>
          <Field label="Commande">
            <input value={ref} onChange={(e) => setRef(e.target.value)} className="w-full p-2.5 rounded-lg text-sm" style={inputStyle} placeholder="Ex. 6 baguettes, 2 tartes (optionnel)" />
          </Field>
          <Field label="Instructions">
            <textarea value={instructions} onChange={(e) => setInstructions(e.target.value)} rows={2} className="w-full p-2.5 rounded-lg text-sm resize-none" style={inputStyle} placeholder="Code immeuble, étage… (optionnel)" />
          </Field>
          <button type="submit" className="mt-2 py-3 rounded-xl font-medium text-sm" style={{ background: COLORS.crust, color: COLORS.flour }}>
            Ajouter à la tournée
          </button>
        </form>
      </div>
    </div>
  );
}

function DetailModal({ d, onClose, onPoint, onRevert, onDelete }) {
  const [outcome, setOutcome] = useState('delivered');
  const [recipient, setRecipient] = useState('');
  const [note, setNote] = useState('');

  function submitPointage() {
    onPoint(d.id, { status: outcome, deliveredAt: new Date().toISOString(), recipient: recipient.trim(), note: note.trim() });
  }
  const isPointed = d.status !== 'pending';
  const meta = STATUS_META[d.status];

  return (
    <div className="fixed inset-0 z-40 flex items-end sm:items-center justify-center" style={{ background: 'rgba(43,27,18,0.55)' }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} className="w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-5 overflow-y-auto relative" style={{ background: COLORS.flour, maxHeight: '90vh' }}>
        <button onClick={onClose} className="absolute top-5 left-5 z-10"><IconX size={20} style={{ color: COLORS.taupe }} /></button>
        {isPointed && (
          <div className="stamp absolute top-4 right-4" style={{ width: 70, height: 70, borderRadius: '50%', border: `2px solid ${meta.fg}`, display: 'flex', alignItems: 'center', justifyContent: 'center', transform: 'rotate(-12deg)', background: COLORS.flour }}>
            <div style={{ width: 56, height: 56, borderRadius: '50%', border: `1px dashed ${meta.fg}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ fontFamily: MONO_FONT, fontWeight: 700, color: meta.fg, fontSize: '9px', textAlign: 'center', lineHeight: 1.2 }}>
                {meta.label.toUpperCase()}<br />{new Date(d.deliveredAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}
              </span>
            </div>
          </div>
        )}
        <div className="pt-8 pr-16">
          <p style={{ fontFamily: MONO_FONT, color: COLORS.taupe }} className="text-xs mb-0.5">{d.time}{d.ref ? ` · ${d.ref}` : ''}</p>
          <h2 style={{ fontFamily: DISPLAY_FONT, color: COLORS.crust }} className="text-xl font-semibold leading-tight">{d.client}</h2>
        </div>
        <div className="flex items-start gap-2 mt-3 text-sm" style={{ color: COLORS.crust }}>
          <IconMapPin size={16} style={{ color: COLORS.taupe, marginTop: 2, flexShrink: 0 }} />
          <span>{d.address}</span>
        </div>
        {d.instructions && (
          <div className="flex items-start gap-2 mt-1 text-sm" style={{ color: COLORS.taupe }}>
            <IconFileText size={16} style={{ marginTop: 2, flexShrink: 0 }} />
            <span>{d.instructions}</span>
          </div>
        )}
        <div className="h-px my-4" style={{ background: COLORS.border }} />

        {!isPointed ? (
          <div className="flex flex-col gap-3">
            <p className="text-sm font-semibold" style={{ color: COLORS.crust }}>Pointer la livraison</p>
            <div className="grid grid-cols-2 gap-2">
              {OUTCOMES.map((o) => {
                const ActiveIcon = o.icon;
                const active = outcome === o.key;
                return (
                  <button key={o.key} type="button" onClick={() => setOutcome(o.key)} className="flex items-center justify-center gap-1.5 py-2.5 rounded-lg text-sm font-medium"
                    style={active ? { background: STATUS_META[o.key].fg, color: '#fff' } : { background: '#fff', border: `1px solid ${COLORS.border}`, color: COLORS.crust }}>
                    <ActiveIcon size={15} />{o.label}
                  </button>
                );
              })}
            </div>
            <Field label="Réceptionné par (optionnel)">
              <input value={recipient} onChange={(e) => setRecipient(e.target.value)} className="w-full p-2.5 rounded-lg text-sm" style={inputStyle} placeholder="Nom de la personne" />
            </Field>
            <Field label="Vos constats">
              <textarea value={note} onChange={(e) => setNote(e.target.value)} rows={3} className="w-full p-2.5 rounded-lg text-sm resize-none" style={inputStyle} placeholder="Ex. remis en main propre, laissé chez le voisin, code portail changé…" />
            </Field>
            <button type="button" onClick={submitPointage} className="mt-1 py-3 rounded-xl font-medium text-sm" style={{ background: STATUS_META[outcome].fg, color: '#fff' }}>
              Valider le pointage
            </button>
          </div>
        ) : (
          <div className="flex flex-col gap-3">
            <div className="grid grid-cols-2 gap-3 text-sm">
              <div>
                <p style={{ color: COLORS.taupe, fontSize: '11px' }}>Heure réelle</p>
                <p style={{ fontFamily: MONO_FONT, color: COLORS.crust }} className="font-medium">{new Date(d.deliveredAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</p>
              </div>
              {d.recipient && (
                <div>
                  <p style={{ color: COLORS.taupe, fontSize: '11px' }}>Réceptionné par</p>
                  <p className="font-medium" style={{ color: COLORS.crust }}>{d.recipient}</p>
                </div>
              )}
            </div>
            {d.note && (
              <div>
                <p className="mb-1" style={{ color: COLORS.taupe, fontSize: '11px' }}>Constats</p>
                <p className="text-sm" style={{ color: COLORS.crust }}>{d.note}</p>
              </div>
            )}
            <div className="flex gap-2 mt-2">
              <button onClick={() => onRevert(d.id)} className="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-lg text-sm font-medium" style={{ background: '#fff', border: `1px solid ${COLORS.border}`, color: COLORS.crust }}>
                <IconUndo size={14} />Annuler le pointage
              </button>
              <button onClick={() => onDelete(d.id)} className="px-3 py-2.5 rounded-lg" style={{ background: COLORS.briqueSoft, color: COLORS.brique }}>
                <IconTrash size={16} />
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function DeliveryApp() {
  const [date, setDate] = useState(() => toLocalISODate(new Date()));
  const [deliveries, setDeliveries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [selected, setSelected] = useState(null);
  const [errorMsg, setErrorMsg] = useState('');

  useEffect(() => { load(date); }, [date]);

  function load(d) {
    setLoading(true);
    setErrorMsg('');
    try {
      const raw = localStorage.getItem(`fdj-tournee:${d}`);
      const list = raw ? JSON.parse(raw) : [];
      setDeliveries(Array.isArray(list) ? list : []);
    } catch (e) {
      setDeliveries([]);
    } finally {
      setLoading(false);
    }
  }
  function persist(list, forDate) {
    setDeliveries(list);
    try {
      localStorage.setItem(`fdj-tournee:${forDate}`, JSON.stringify(list));
    } catch (e) {
      setErrorMsg("La sauvegarde a échoué sur cet appareil.");
    }
  }
  function handleAddSubmit(data) {
    const entry = {
      id: genId(), client: data.client, address: data.address, time: data.time,
      ref: data.ref || '', instructions: data.instructions || '',
      status: 'pending', deliveredAt: null, recipient: '', note: '',
      createdAt: new Date().toISOString(),
    };
    persist([...deliveries, entry], date);
    setShowAdd(false);
  }
  function pointDelivery(id, updates) {
    const next = deliveries.map((d) => (d.id === id ? { ...d, ...updates } : d));
    persist(next, date);
    setSelected((prev) => (prev && prev.id === id ? { ...prev, ...updates } : prev));
  }
  function revertDelivery(id) {
    pointDelivery(id, { status: 'pending', deliveredAt: null, recipient: '', note: '' });
  }
  function deleteDelivery(id) {
    persist(deliveries.filter((d) => d.id !== id), date);
    setSelected(null);
  }
  function changeDate(delta) {
    if (delta === 'today') { setDate(toLocalISODate(new Date())); return; }
    const [y, m, dd] = date.split('-').map(Number);
    const dt = new Date(y, m - 1, dd);
    dt.setDate(dt.getDate() + delta);
    setDate(toLocalISODate(dt));
  }

  const total = deliveries.length;
  const deliveredCount = deliveries.filter((d) => d.status === 'delivered').length;
  const pendingCount = deliveries.filter((d) => d.status === 'pending').length;
  const issueCount = deliveries.filter((d) => ['absent', 'refused', 'incident'].includes(d.status)).length;

  const sorted = [...deliveries].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  const groups = {};
  sorted.forEach((d) => {
    const hour = (d.time || '00:00').split(':')[0];
    if (!groups[hour]) groups[hour] = [];
    groups[hour].push(d);
  });
  const hourKeys = Object.keys(groups).sort();

  return (
    <div style={{ background: COLORS.flour, fontFamily: "'Inter', sans-serif", minHeight: '100vh', color: COLORS.crust }}>
      <div className="max-w-lg mx-auto px-4 pb-28">
        <div className="flex items-center gap-3 pt-6 pb-1">
          <div style={{ width: 48, height: 48, borderRadius: '50%', background: COLORS.crust, border: `2px solid ${COLORS.wheat}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <span style={{ fontFamily: DISPLAY_FONT, color: COLORS.wheat, fontWeight: 700, fontSize: '15px' }}>FdJ</span>
          </div>
          <div>
            <p className="uppercase font-semibold mb-0.5" style={{ color: COLORS.taupe, fontSize: '10px', letterSpacing: '0.12em' }}>Carnet de tournée</p>
            <h1 style={{ fontFamily: DISPLAY_FONT, color: COLORS.crust }} className="text-2xl font-semibold leading-none">Fournil de Jean</h1>
          </div>
        </div>
        <p className="text-xs mb-4" style={{ color: COLORS.taupe }}>Suivi des livraisons, heure par heure</p>

        {errorMsg && (
          <div className="mb-3 text-xs px-3 py-2 rounded-lg" style={{ background: COLORS.briqueSoft, color: COLORS.brique }}>{errorMsg}</div>
        )}

        <div className="flex items-center gap-2 mb-4">
          <button onClick={() => changeDate(-1)} className="p-2.5 rounded-lg" style={{ background: COLORS.cardBg, border: `1px solid ${COLORS.border}` }}>
            <IconChevronLeft size={18} style={{ color: COLORS.crust }} />
          </button>
          <button onClick={() => changeDate('today')} className="flex-1 text-center py-2.5 rounded-lg" style={{ background: COLORS.cardBg, border: `1px solid ${COLORS.border}` }}>
            <span className="font-medium text-sm" style={{ color: COLORS.crust }}>{formatDateLabel(date)}</span>
          </button>
          <button onClick={() => changeDate(1)} className="p-2.5 rounded-lg" style={{ background: COLORS.cardBg, border: `1px solid ${COLORS.border}` }}>
            <IconChevronRight size={18} style={{ color: COLORS.crust }} />
          </button>
        </div>

        <div className="grid grid-cols-4 gap-2 mb-5">
          <StatChip label="Total" value={total} color={COLORS.crust} />
          <StatChip label="Livrées" value={deliveredCount} color={COLORS.herb} />
          <StatChip label="Attente" value={pendingCount} color={COLORS.wheat} />
          <StatChip label="Incidents" value={issueCount} color={COLORS.brique} />
        </div>

        {loading ? (
          <div className="flex flex-col items-center justify-center py-20" style={{ color: COLORS.taupe }}>
            <Spinner size={28} />
            <span className="text-sm mt-2">Chargement de la tournée…</span>
          </div>
        ) : hourKeys.length === 0 ? (
          <EmptyState text="Aucune livraison prévue pour cette date." sub="Ajoutez votre première livraison avec le bouton +." />
        ) : (
          hourKeys.map((hour) => (
            <div key={hour} className="mb-6">
              <div className="flex items-center gap-3 mb-2">
                <span style={{ fontFamily: DISPLAY_FONT, color: COLORS.crust }} className="text-xl font-semibold">{hour}h</span>
                <div className="flex-1 h-px" style={{ background: COLORS.border }} />
              </div>
              <div className="flex flex-col gap-2">
                {groups[hour].map((d) => (
                  <DeliveryCard key={d.id} d={d} onClick={() => setSelected(d)} />
                ))}
              </div>
            </div>
          ))
        )}
      </div>

      <button onClick={() => setShowAdd(true)} className="fixed bottom-6 right-6 rounded-full p-4 z-30" style={{ background: COLORS.wheat, color: COLORS.crust, boxShadow: '0 6px 16px rgba(201,138,43,0.4)' }}>
        <IconPlus size={22} />
      </button>

      {showAdd && <AddDeliveryModal onClose={() => setShowAdd(false)} onSubmit={handleAddSubmit} />}
      {selected && (
        <DetailModal d={selected} onClose={() => setSelected(null)} onPoint={pointDelivery} onRevert={revertDelivery} onDelete={deleteDelivery} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DeliveryApp />);
</script>
</body>
</html>
