<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Fournil de Jean" />
<meta name="theme-color" content="#2B1B12" />
<title>Fournil de Jean — Carnet de tournée</title>
<style>
  :root {
    --crust: #2B1B12;
    --flour: #FBF7EE;
    --cardbg: #FFFFFF;
    --wheat: #C98A2B;
    --wheat-soft: #F7E9D2;
    --herb: #5B7553;
    --herb-soft: #E9F0E6;
    --brique: #B5392C;
    --brique-soft: #FAE6E3;
    --taupe: #8A7860;
    --border: #E6DCC8;
    --display-font: Georgia, 'Times New Roman', serif;
    --body-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    --mono-font: 'Courier New', Courier, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--flour); font-family: var(--body-font); color: var(--crust); }
  .container { max-width: 480px; margin: 0 auto; padding: 0 16px 112px; }
  .header-row { display: flex; align-items: center; gap: 12px; padding-top: 24px; padding-bottom: 4px; }
  .badge-circle { width: 48px; height: 48px; border-radius: 50%; background: var(--crust); border: 2px solid var(--wheat); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .badge-circle span { font-family: var(--display-font); color: var(--wheat); font-weight: 700; font-size: 15px; }
  .eyebrow { text-transform: uppercase; font-weight: 600; color: var(--taupe); font-size: 10px; letter-spacing: 0.12em; margin: 0 0 2px; }
  .brand-title { font-family: var(--display-font); color: var(--crust); font-size: 24px; font-weight: 700; line-height: 1; margin: 0; }
  .subtitle { font-size: 12px; color: var(--taupe); margin: 6px 0 16px; }
  .error-box { margin-bottom: 12px; font-size: 12px; padding: 8px 12px; border-radius: 8px; background: var(--brique-soft); color: var(--brique); }
  .date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .btn-icon, .date-btn { background: #fff; border: 1px solid var(--border); border-radius: 8px; color: var(--crust); font-family: var(--body-font); }
  .btn-icon { padding: 10px; font-size: 16px; line-height: 1; }
  .date-btn { flex: 1; text-align: center; padding: 10px; font-weight: 500; font-size: 14px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
  .stat-chip { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 8px 0; text-align: center; }
  .stat-value { font-family: var(--mono-font); font-size: 18px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--taupe); margin-top: 4px; }
  .hour-block { margin-bottom: 24px; }
  .hour-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .hour-label { font-family: var(--display-font); color: var(--crust); font-size: 20px; font-weight: 700; }
  .hour-line { flex: 1; height: 1px; background: var(--border); }
  .delivery-list { display: flex; flex-direction: column; gap: 8px; }
  .delivery-card { text-align: left; width: 100%; border-radius: 12px; padding: 12px; background: #fff; border: 1px solid var(--border); cursor: pointer; font-family: var(--body-font); }
  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .card-time { font-family: var(--mono-font); color: var(--taupe); font-size: 11px; }
  .status-badge { font-weight: 600; font-size: 10px; padding: 2px 8px; border-radius: 999px; display: inline-block; }
  .card-client { font-weight: 700; font-size: 14px; color: var(--crust); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-address { font-size: 12px; color: var(--taupe); margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 64px 24px; }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; color: var(--border); }
  .empty-state .title { font-weight: 600; font-size: 14px; color: var(--crust); margin: 0; }
  .empty-state .sub { font-size: 12px; color: var(--taupe); margin: 4px 0 0; }
  .fab { position: fixed; bottom: 24px; right: 24px; border-radius: 50%; width: 56px; height: 56px; background: var(--wheat); color: var(--crust); border: none; box-shadow: 0 6px 16px rgba(201,138,43,0.4); z-index: 30; font-size: 26px; line-height: 1; cursor: pointer; }
  .modal-overlay { position: fixed; inset: 0; z-index: 40; display: flex; align-items: flex-end; justify-content: center; background: rgba(43,27,18,0.55); }
  .modal-box { width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; background: var(--flour); max-height: 90vh; position: relative; }
  @media (min-width: 640px) {
    .modal-overlay { align-items: center; }
    .modal-box { border-radius: 20px; }
  }
  .modal-title { font-family: var(--display-font); color: var(--crust); font-size: 18px; font-weight: 700; margin: 0; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .close-btn { background: none; border: none; font-size: 20px; color: var(--taupe); cursor: pointer; padding: 4px; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--taupe); }
  .field input, .field textarea {
    width: 100%; padding: 10px; border-radius: 8px; font-size: 14px; background: #fff; border: 1px solid var(--border); color: var(--crust); font-family: var(--body-font);
  }
  .field textarea { resize: none; }
  .btn-primary { width: 100%; padding: 13px; border-radius: 12px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; background: var(--crust); color: var(--flour); margin-top: 4px; }
  .outcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .outcome-btn { padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: #fff; border: 1px solid var(--border); color: var(--crust); }
  .outcome-btn.active { color: #fff; border: none; }
  .detail-section-title { font-size: 14px; font-weight: 600; margin: 0 0 12px; color: var(--crust); }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .info-row { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; margin-top: 10px; }
  .recap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 14px; margin-bottom: 12px; }
  .recap-label { font-size: 11px; color: var(--taupe); margin: 0 0 2px; }
  .recap-value { font-weight: 600; margin: 0; }
  .recap-value.mono { font-family: var(--mono-font); }
  .actions-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-outline { flex: 1; padding: 10px; border-radius: 8px; background: #fff; border: 1px solid var(--border); color: var(--crust); font-weight: 500; font-size: 14px; cursor: pointer; }
  .btn-danger { padding: 10px 14px; border-radius: 8px; background: var(--brique-soft); color: var(--brique); border: none; cursor: pointer; font-size: 16px; }
  .stamp { position: absolute; top: 16px; right: 16px; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: rotate(-12deg); background: var(--flour); animation: stampIn 0.35s ease-out; }
  .stamp-inner { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; }
  .stamp-text { font-family: var(--mono-font); font-weight: 700; font-size: 9px; line-height: 1.2; }
  @keyframes stampIn { 0% { opacity: 0; transform: scale(1.6) rotate(-18deg);} 60% { opacity: 1; } 100% { opacity: 1; transform: scale(1) rotate(-12deg);} }
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; color: var(--taupe); }
  .spinner { width: 28px; height: 28px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--crust); animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  "use strict";

  var STATUS_META = {
    pending:   { label: 'En attente', fg: '#C98A2B', bg: '#F7E9D2' },
    delivered: { label: 'Livré',      fg: '#5B7553', bg: '#E9F0E6' },
    absent:    { label: 'Absent',     fg: '#B5392C', bg: '#FAE6E3' },
    refused:   { label: 'Refusé',     fg: '#B5392C', bg: '#FAE6E3' },
    incident:  { label: 'Incident',   fg: '#B5392C', bg: '#FAE6E3' }
  };
  var OUTCOMES = [
    { key: 'delivered', label: 'Livré' },
    { key: 'absent', label: 'Absent' },
    { key: 'refused', label: 'Refusé' },
    { key: 'incident', label: 'Incident' }
  ];

  var state = {
    date: toLocalISODate(new Date()),
    deliveries: [],
    loading: true,
    showAdd: false,
    selectedId: null,
    errorMsg: '',
    pendingOutcome: 'delivered'
  };

  function toLocalISODate(d) {
    var y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }
  function formatDateLabel(dateStr) {
    var parts = dateStr.split('-').map(Number);
    var dt = new Date(parts[0], parts[1] - 1, parts[2]);
    var label = dt.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    return label.charAt(0).toUpperCase() + label.slice(1);
  }
  function genId() { return 'd_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function load(date) {
    state.loading = true;
    state.errorMsg = '';
    render();
    try {
      var raw = localStorage.getItem('fdj-tournee:' + date);
      var list = raw ? JSON.parse(raw) : [];
      state.deliveries = Array.isArray(list) ? list : [];
    } catch (e) {
      state.deliveries = [];
    }
    state.loading = false;
    render();
  }
  function persist(list) {
    state.deliveries = list;
    try {
      localStorage.setItem('fdj-tournee:' + state.date, JSON.stringify(list));
    } catch (e) {
      state.errorMsg = "La sauvegarde a échoué sur cet appareil.";
    }
  }

  function addDelivery(data) {
    var entry = {
      id: genId(), client: data.client, address: data.address, time: data.time,
      ref: data.ref || '', instructions: data.instructions || '',
      status: 'pending', deliveredAt: null, recipient: '', note: '',
      createdAt: new Date().toISOString()
    };
    persist(state.deliveries.concat([entry]));
    state.showAdd = false;
    render();
  }
  function pointDelivery(id, updates) {
    var next = state.deliveries.map(function (d) { return d.id === id ? Object.assign({}, d, updates) : d; });
    persist(next);
    render();
  }
  function revertDelivery(id) {
    pointDelivery(id, { status: 'pending', deliveredAt: null, recipient: '', note: '' });
  }
  function deleteDelivery(id) {
    persist(state.deliveries.filter(function (d) { return d.id !== id; }));
    state.selectedId = null;
    render();
  }
  function changeDate(delta) {
    if (delta === 'today') { state.date = toLocalISODate(new Date()); }
    else {
      var parts = state.date.split('-').map(Number);
      var dt = new Date(parts[0], parts[1] - 1, parts[2]);
      dt.setDate(dt.getDate() + delta);
      state.date = toLocalISODate(dt);
    }
    load(state.date);
  }

  function statChip(label, value, color) {
    return '<div class="stat-chip"><p class="stat-value" style="color:' + color + '">' + value + '</p><p class="stat-label">' + label + '</p></div>';
  }

  function deliveryCard(d) {
    var meta = STATUS_META[d.status];
    return '' +
      '<button class="delivery-card" data-action="select" data-id="' + d.id + '">' +
        '<div class="card-top">' +
          '<span class="card-time">' + esc(d.time) + '</span>' +
          '<span class="status-badge" style="color:' + meta.fg + ';background:' + meta.bg + '">' + meta.label + '</span>' +
        '</div>' +
        '<p class="card-client">' + esc(d.client) + '</p>' +
        '<p class="card-address">' + esc(d.address) + '</p>' +
      '</button>';
  }

  function renderTimeline() {
    if (state.loading) {
      return '<div class="loading-state"><div class="spinner"></div><span style="font-size:14px;margin-top:8px;">Chargement de la tournée…</span></div>';
    }
    var sorted = state.deliveries.slice().sort(function (a, b) { return (a.time || '').localeCompare(b.time || ''); });
    if (sorted.length === 0) {
      return '<div class="empty-state"><div class="icon">📦</div><p class="title">Aucune livraison prévue pour cette date.</p><p class="sub">Ajoutez votre première livraison avec le bouton +.</p></div>';
    }
    var groups = {};
    var order = [];
    sorted.forEach(function (d) {
      var hour = (d.time || '00:00').split(':')[0];
      if (!groups[hour]) { groups[hour] = []; order.push(hour); }
      groups[hour].push(d);
    });
    order.sort();
    return order.map(function (hour) {
      return '' +
        '<div class="hour-block">' +
          '<div class="hour-header"><span class="hour-label">' + hour + 'h</span><div class="hour-line"></div></div>' +
          '<div class="delivery-list">' + groups[hour].map(deliveryCard).join('') + '</div>' +
        '</div>';
    }).join('');
  }

  function renderAddModal() {
    if (!state.showAdd) return '';
    var now = new Date();
    var roundedMin = Math.ceil(now.getMinutes() / 5) * 5 % 60;
    var defaultTime = String(now.getHours()).padStart(2, '0') + ':' + String(roundedMin).padStart(2, '0');
    return '' +
      '<div class="modal-overlay" data-action="close-add">' +
        '<div class="modal-box" data-action="noop">' +
          '<div class="modal-header"><h2 class="modal-title">Nouvelle livraison</h2><button class="close-btn" data-action="close-add">&#10005;</button></div>' +
          '<div class="field"><label>Client *</label><input id="f-client" placeholder="Nom du client" /></div>' +
          '<div class="field"><label>Adresse *</label><input id="f-address" placeholder="Adresse de livraison" /></div>' +
          '<div class="field"><label>Heure prévue *</label><input id="f-time" type="time" value="' + defaultTime + '" /></div>' +
          '<div class="field"><label>Commande</label><input id="f-ref" placeholder="Ex. 6 baguettes, 2 tartes (optionnel)" /></div>' +
          '<div class="field"><label>Instructions</label><textarea id="f-instructions" rows="2" placeholder="Code immeuble, étage… (optionnel)"></textarea></div>' +
          '<button class="btn-primary" data-action="submit-add">Ajouter à la tournée</button>' +
        '</div>' +
      '</div>';
  }

  function renderDetailModal() {
    if (!state.selectedId) return '';
    var d = state.deliveries.find(function (x) { return x.id === state.selectedId; });
    if (!d) return '';
    var meta = STATUS_META[d.status];
    var isPointed = d.status !== 'pending';
    var html = '<div class="modal-overlay" data-action="close-detail"><div class="modal-box" data-action="noop">';
    html += '<button class="close-btn" style="position:absolute;top:18px;left:18px;" data-action="close-detail">&#10005;</button>';
    if (isPointed) {
      var timeStr = d.deliveredAt ? new Date(d.deliveredAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';
      html += '<div class="stamp"><div class="stamp-inner" style="border:1px dashed ' + meta.fg + ';"><span class="stamp-text" style="color:' + meta.fg + '">' + meta.label.toUpperCase() + '<br>' + timeStr + '</span></div></div>';
      html = html.replace('<div class="stamp">', '<div class="stamp" style="border:2px solid ' + meta.fg + ';">');
    }
    html += '<div style="padding-top:32px;padding-right:64px;">';
    html += '<p style="font-family:var(--mono-font);color:var(--taupe);font-size:12px;margin:0 0 2px;">' + esc(d.time) + (d.ref ? ' · ' + esc(d.ref) : '') + '</p>';
    html += '<h2 style="font-family:var(--display-font);color:var(--crust);font-size:20px;font-weight:700;margin:0;">' + esc(d.client) + '</h2>';
    html += '</div>';
    html += '<div class="info-row"><span>📍</span><span>' + esc(d.address) + '</span></div>';
    if (d.instructions) {
      html += '<div class="info-row" style="color:var(--taupe);"><span>📝</span><span>' + esc(d.instructions) + '</span></div>';
    }
    html += '<div class="divider"></div>';

    if (!isPointed) {
      html += '<p class="detail-section-title">Pointer la livraison</p>';
      html += '<div class="outcome-grid">';
      OUTCOMES.forEach(function (o) {
        var active = state.pendingOutcome === o.key;
        var m = STATUS_META[o.key];
        var style = active ? ('background:' + m.fg + ';') : '';
        html += '<button class="outcome-btn' + (active ? ' active' : '') + '" style="' + style + '" data-action="set-outcome" data-key="' + o.key + '">' + o.label + '</button>';
      });
      html += '</div>';
      html += '<div class="field"><label>Réceptionné par (optionnel)</label><input id="f-recipient" placeholder="Nom de la personne" /></div>';
      html += '<div class="field"><label>Vos constats</label><textarea id="f-note" rows="3" placeholder="Ex. remis en main propre, laissé chez le voisin, code portail changé…"></textarea></div>';
      var btnColor = STATUS_META[state.pendingOutcome].fg;
      html += '<button class="btn-primary" style="background:' + btnColor + ';color:#fff;" data-action="submit-point" data-id="' + d.id + '">Valider le pointage</button>';
    } else {
      html += '<div class="recap-grid">';
      var timeStr2 = d.deliveredAt ? new Date(d.deliveredAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';
      html += '<div><p class="recap-label">Heure réelle</p><p class="recap-value mono">' + timeStr2 + '</p></div>';
      if (d.recipient) {
        html += '<div><p class="recap-label">Réceptionné par</p><p class="recap-value">' + esc(d.recipient) + '</p></div>';
      }
      html += '</div>';
      if (d.note) {
        html += '<div style="margin-bottom:12px;"><p class="recap-label">Constats</p><p style="font-size:14px;margin:0;">' + esc(d.note) + '</p></div>';
      }
      html += '<div class="actions-row">';
      html += '<button class="btn-outline" data-action="revert" data-id="' + d.id + '">&#8634; Annuler le pointage</button>';
      html += '<button class="btn-danger" data-action="delete" data-id="' + d.id + '">&#128465;</button>';
      html += '</div>';
    }
    html += '</div></div>';
    return html;
  }

  function render() {
    var total = state.deliveries.length;
    var deliveredCount = state.deliveries.filter(function (d) { return d.status === 'delivered'; }).length;
    var pendingCount = state.deliveries.filter(function (d) { return d.status === 'pending'; }).length;
    var issueCount = state.deliveries.filter(function (d) { return ['absent', 'refused', 'incident'].indexOf(d.status) !== -1; }).length;

    var html = '<div class="container">';
    html += '<div class="header-row"><div class="badge-circle"><span>FdJ</span></div><div><p class="eyebrow">Carnet de tournée</p><h1 class="brand-title">Fournil de Jean</h1></div></div>';
    html += '<p class="subtitle">Suivi des livraisons, heure par heure</p>';
    if (state.errorMsg) html += '<div class="error-box">' + esc(state.errorMsg) + '</div>';
    html += '<div class="date-row">';
    html += '<button class="btn-icon" data-action="prev-day">&#8249;</button>';
    html += '<button class="date-btn" data-action="today">' + formatDateLabel(state.date) + '</button>';
    html += '<button class="btn-icon" data-action="next-day">&#8250;</button>';
    html += '</div>';
    html += '<div class="stats-grid">';
    html += statChip('Total', total, '#2B1B12');
    html += statChip('Livrées', deliveredCount, '#5B7553');
    html += statChip('Attente', pendingCount, '#C98A2B');
    html += statChip('Incidents', issueCount, '#B5392C');
    html += '</div>';
    html += renderTimeline();
    html += '</div>';
    html += '<button class="fab" data-action="open-add">+</button>';
    html += renderAddModal();
    html += renderDetailModal();

    document.getElementById('app').innerHTML = html;
  }

  document.getElementById('app').addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    var id = el.getAttribute('data-id');

    if (action === 'prev-day') changeDate(-1);
    else if (action === 'next-day') changeDate(1);
    else if (action === 'today') changeDate('today');
    else if (action === 'open-add') { state.showAdd = true; render(); }
    else if (action === 'close-add') { state.showAdd = false; render(); }
    else if (action === 'submit-add') {
      var client = document.getElementById('f-client').value.trim();
      var address = document.getElementById('f-address').value.trim();
      var time = document.getElementById('f-time').value;
      var ref = document.getElementById('f-ref').value.trim();
      var instructions = document.getElementById('f-instructions').value.trim();
      if (!client || !address || !time) { return; }
      addDelivery({ client: client, address: address, time: time, ref: ref, instructions: instructions });
    }
    else if (action === 'select') { state.selectedId = id; state.pendingOutcome = 'delivered'; render(); }
    else if (action === 'close-detail') { state.selectedId = null; render(); }
    else if (action === 'set-outcome') { state.pendingOutcome = el.getAttribute('data-key'); render(); }
    else if (action === 'submit-point') {
      var recipient = document.getElementById('f-recipient').value.trim();
      var note = document.getElementById('f-note').value.trim();
      pointDelivery(id, { status: state.pendingOutcome, deliveredAt: new Date().toISOString(), recipient: recipient, note: note });
    }
    else if (action === 'revert') revertDelivery(id);
    else if (action === 'delete') deleteDelivery(id);
  });

  load(state.date);
})();
</script>
</body>
</html>
